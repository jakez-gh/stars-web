<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars! — Star Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/star_map.css') }}">
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <h1 id="game-title">Stars!</h1>
            <span id="game-info"></span>
            <div id="controls">
                <label><input type="checkbox" id="show-names" checked> Names</label>
                <label><input type="checkbox" id="show-fleets" checked> Fleets</label>
                <label><input type="checkbox" id="show-unowned" checked> Unowned</label>
            </div>
        </header>
        <div id="map-container">
            <canvas id="star-map"></canvas>
        </div>
        <aside id="detail-panel" class="hidden">
            <button id="close-detail">&times;</button>
            <h2 id="detail-name"></h2>
            <div id="detail-body"></div>
        </aside>
    </div>
    <script src="{{ url_for('static', filename='js/star_map.js') }}"></script>
</body>
</html>
