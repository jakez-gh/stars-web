<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars! — Star Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/star_map.css') }}{% if cache_hashes.star_map_css %}?v={{ cache_hashes.star_map_css }}{% endif %}">
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <h1 id="game-title">Stars!</h1>
            <span id="game-info"></span>
            <div id="controls">
                <label><input type="checkbox" id="show-names" checked> Names</label>
                <label><input type="checkbox" id="show-fleets" checked> Fleets</label>
                <label><input type="checkbox" id="show-unowned" checked> Unowned</label>
                <label>Overlay
                    <select id="overlay-mode">
                        <option value="none">None</option>
                        <option value="population">Population</option>
                        <option value="minerals">Minerals</option>
                        <option value="habitability">Habitability</option>
                    </select>
                </label>
                <button id="submit-turn-btn" disabled>Submit Turn</button>
            </div>
        </header>
        <div id="map-container">
            <canvas id="star-map"></canvas>
        </div>
        <aside id="detail-panel" class="hidden">
            <button id="close-detail">&times;</button>
            <h2 id="detail-name"></h2>
            <div id="detail-body"></div>
        </aside>
        <div id="host-log-panel" class="hidden">
            <div id="host-log-header">
                <strong id="host-log-title">Host Output</strong>
                <button id="host-log-close">&times;</button>
            </div>
            <pre id="host-log-body"></pre>
        </div>
    </div>
    <div id="changelog-modal" class="hidden">
        <div id="changelog-backdrop"></div>
        <div id="changelog-card">
            <h2 id="changelog-title"></h2>
            <ul id="changelog-list"></ul>
            <button id="changelog-dismiss">Got it</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/star_map.js') }}{% if cache_hashes.star_map_js %}?v={{ cache_hashes.star_map_js }}{% endif %}"></script>
</body>
</html>
