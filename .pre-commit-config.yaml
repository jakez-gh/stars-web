# Pre-commit hooks for stars-web
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Markdown linting + auto-fix
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --ignore, node_modules]

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]

  # Inventory documentation quality gate
  - repo: local
    hooks:
      - id: check-inventory
        name: inventory quality gate (MANIFEST sections match filesystem)
        entry: py -3.11 tools/check_inventory.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

  # Run pytest as a local quality gate
  - repo: local
    hooks:
      - id: pytest
        name: pytest (with 50% coverage threshold, property-based tests, parallel)
        entry: py -3.11 -m pytest tests/ --cov=src/stars_web --cov-fail-under=50 -x --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]
